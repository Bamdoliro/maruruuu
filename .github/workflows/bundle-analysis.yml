name: Bundle Analysis

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build

      - name: Calculate bundle sizes
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            function getDirSize(dir) {
              if (!fs.existsSync(dir)) return 0;
              let size = 0;
              const entries = fs.readdirSync(dir, { recursive: true, withFileTypes: true });
              for (const entry of entries) {
                if (entry.isFile()) {
                  const fullPath = path.join(entry.parentPath || entry.path, entry.name);
                  size += fs.statSync(fullPath).size;
                }
              }
              return size;
            }

            const sizes = {};
            for (const app of ['user', 'admin']) {
              sizes[app] = {
                static: getDirSize('apps/' + app + '/.next/static'),
                total: getDirSize('apps/' + app + '/.next'),
              };
            }

            fs.writeFileSync('bundle-sizes.json', JSON.stringify(sizes));
          "

      - name: Save base sizes
        if: github.event_name == 'push'
        run: cp bundle-sizes.json base-bundle-sizes.json

      - name: Upload base sizes
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: base-bundle-sizes.json
          key: bundle-sizes-main-${{ github.sha }}

      - name: Restore base sizes
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: base-bundle-sizes.json
          key: bundle-sizes-main-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            bundle-sizes-main-

      - name: Post bundle report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const current = JSON.parse(fs.readFileSync('bundle-sizes.json', 'utf8'));

            let base = null;
            try {
              base = JSON.parse(fs.readFileSync('base-bundle-sizes.json', 'utf8'));
            } catch {}

            const fmt = (bytes) => {
              if (bytes < 1024) return bytes + ' B';
              if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
              return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
            };

            const diff = (curr, prev) => {
              if (!prev) return '';
              const d = curr - prev;
              const pct = Math.abs((d / prev) * 100).toFixed(1);
              const prefix = d > 0 ? '+' : d < 0 ? '-' : '';
              const warn = d > prev * 0.2 ? ' ⚠️' : d < 0 ? ' ✅' : '';
              return ` (${prefix}${fmt(Math.abs(d))}, ${prefix}${pct}%)${warn}`;
            };

            let body = '## 📦 Bundle Size Report\n\n';
            body += '| App | Static Assets | Total |\n';
            body += '|-----|--------------|-------|\n';

            for (const app of ['user', 'admin']) {
              const c = current[app];
              const b = base ? base[app] : null;
              body += `| ${app} | ${fmt(c.static)}${diff(c.static, b?.static)} | ${fmt(c.total)}${diff(c.total, b?.total)} |\n`;
            }

            if (!base) {
              body += '\n> ℹ️ Base branch sizes not available yet. Push to main to generate baseline.\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('Bundle Size Report')
            );

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
