name: Auto Assign Issues

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-assign unassigned issues to creator
        uses: actions/github-script@v7
        with:
          script: |
            const org = 'Bamdoliro';

            const members = await github.paginate(github.rest.orgs.listMembers, { org });
            const memberLogins = new Set(members.map(m => m.login));

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              assignee: 'none',
              per_page: 50,
            });

            const tenMinAgo = new Date(Date.now() - 10 * 60 * 1000);

            for (const issue of issues) {
              if (issue.pull_request) continue;
              if (new Date(issue.created_at) > tenMinAgo) continue;
              if (!memberLogins.has(issue.user.login)) continue;

              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [issue.user.login],
              });

              core.info(`Assigned #${issue.number} to ${issue.user.login}`);
            }
