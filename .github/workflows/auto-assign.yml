name: Auto Assign Issues

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-assign unassigned issues to creator
        uses: actions/github-script@v7
        with:
          script: |
            const collaborators = await github.paginate(github.rest.repos.listCollaborators, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const collaboratorLogins = new Set(collaborators.map(c => c.login));

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              assignee: 'none',
              per_page: 100,
            });

            const tenMinAgo = new Date(Date.now() - 10 * 60 * 1000);

            for (const issue of issues) {
              if (issue.pull_request) continue;
              if (new Date(issue.created_at) > tenMinAgo) continue;
              if (!collaboratorLogins.has(issue.user.login)) continue;

              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: [issue.user.login],
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `👋 @${issue.user.login} 님이 자동으로 어싸인되었습니다.`,
                });
                core.info(`Assigned #${issue.number} to ${issue.user.login}`);
              } catch (err) {
                core.warning(`Failed to assign #${issue.number}: ${err.message}`);
              }
            }
